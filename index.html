<!DOCTYPE html>
<html>
<head>
  <title>Offline MCQ Test</title>
  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      padding: 30px;
    }
    .box {
      background: white;
      padding: 25px;
      max-width: 700px;
      margin: auto;
      border-radius: 10px;
      box-shadow: 0 0 10px gray;
    }
    h1 { text-align: center; }
    button {
      padding: 10px 20px;
      margin-top: 15px;
      cursor: pointer;
    }
    .option {
      display: block;
      margin: 10px 0;
    }
    #timer {
      font-weight: bold;
      color: red;
      text-align: right;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>Offline MCQ Test</h1>

    <div id="startScreen">
      <label>Name:</label><br>
      <input type="text" id="name"><br><br>

      <label>Roll Number:</label><br>
      <input type="text" id="roll"><br><br>

      <button onclick="startTest()">Start Test</button>
    </div>

    <div id="testScreen" style="display:none;">
      <div id="timer">Time: 05:00</div>
      <h2 id="question"></h2>

      <label class="option"><input type="radio" name="answer" value="0"> <span id="opt0"></span></label>
      <label class="option"><input type="radio" name="answer" value="1"> <span id="opt1"></span></label>
      <label class="option"><input type="radio" name="answer" value="2"> <span id="opt2"></span></label>
      <label class="option"><input type="radio" name="answer" value="3"> <span id="opt3"></span></label>

      <button onclick="nextQuestion()">Next</button>
    </div>

    <div id="resultScreen" style="display:none;">
      <h2>Test Completed</h2>
      <p id="result"></p>
      <button onclick="downloadResult()">Download Result</button>
    </div>
  </div>

<script>
const questions = [
  {
    question: "What is 2 + 2?",
    options: ["3", "4", "5", "6"],
    correct: 1
  },
  {
    question: "Capital of India?",
    options: ["Mumbai", "Delhi", "Chennai", "Kolkata"],
    correct: 1
  },
  {
    question: "Which is used to store data?",
    options: ["CPU", "RAM", "Monitor", "Keyboard"],
    correct: 1
  }
];

let current = 0;
let score = 0;
let timeLeft = 300;
let timer;
let studentName = "";
let rollNo = "";

function startTest() {
  studentName = document.getElementById("name").value;
  rollNo = document.getElementById("roll").value;

  if (studentName === "" || rollNo === "") {
    alert("Please enter name and roll number");
    return;
  }

  document.getElementById("startScreen").style.display = "none";
  document.getElementById("testScreen").style.display = "block";

  loadQuestion();

  timer = setInterval(function() {
    timeLeft--;

    let minutes = Math.floor(timeLeft / 60);
    let seconds = timeLeft % 60;

    document.getElementById("timer").innerText =
      "Time: " + String(minutes).padStart(2, "0") + ":" + String(seconds).padStart(2, "0");

    if (timeLeft <= 0) {
      finishTest();
    }
  }, 1000);
}

function loadQuestion() {
  let q = questions[current];

  document.getElementById("question").innerText = (current + 1) + ". " + q.question;

  for (let i = 0; i < 4; i++) {
    document.getElementById("opt" + i).innerText = q.options[i];
  }

  let radios = document.getElementsByName("answer");
  for (let radio of radios) {
    radio.checked = false;
  }
}

function nextQuestion() {
  let selected = document.querySelector('input[name="answer"]:checked');

  if (!selected) {
    alert("Please select an answer");
    return;
  }

  if (parseInt(selected.value) === questions[current].correct) {
    score++;
  }

  current++;

  if (current < questions.length) {
    loadQuestion();
  } else {
    finishTest();
  }
}

function finishTest() {
  clearInterval(timer);

  document.getElementById("testScreen").style.display = "none";
  document.getElementById("resultScreen").style.display = "block";

  document.getElementById("result").innerHTML =
    "Name: " + studentName + "<br>" +
    "Roll No: " + rollNo + "<br>" +
    "Score: " + score + " / " + questions.length;
}

function downloadResult() {
  let data =
    "Name: " + studentName + "\n" +
    "Roll No: " + rollNo + "\n" +
    "Score: " + score + " / " + questions.length + "\n";

  let blob = new Blob([data], { type: "text/plain" });
  let link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = rollNo + "_result.txt";
  link.click();
}
</script>
</body>
</html>
